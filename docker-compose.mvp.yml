services:
  agenticlabeling:
    build:
      context: .
      dockerfile: Dockerfile.mvp
    image: agenticlabeling:latest
    ports:
      - "8090:8090"
    environment:
      - DATA_DIR=/app/data/mvp
      - SQLITE_PATH=/app/data/mvp/sqlite/mvp.db
      - ASSETS_DIR=/app/data/mvp/assets
      - MASKS_DIR=/app/data/mvp/masks
      - EXPORTS_DIR=/app/data/mvp/exports
      - FLORENCE_MODEL_ID=microsoft/Florence-2-large
    volumes:
      - ./data:/app/data
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    gpus: all
